<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Qamshy Made — Админ панель</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500&family=Mulish:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#F4F4F2;
  --white:#fff;
  --forest:#2B4A3C;
  --forest2:#3A5C4E;
  --gold:#C8A055;
  --dark:#18181A;
  --gray:#6B6B68;
  --lgray:#9A9A96;
  --stone:#E8E4DE;
  --ivory:#F5F2EE;
  --red:#cc3333;
  --green:#2e7d5c;
  --blue:#2563EB;
  --serif:'Playfair Display',serif;
  --sans:'Mulish',sans-serif;
  --sidebar:240px;
}
body{font-family:var(--sans);background:var(--bg);color:var(--dark);font-weight:300;min-height:100vh;display:flex}
a{text-decoration:none;color:inherit}
button{border:none;cursor:pointer;font-family:var(--sans)}
input,select,textarea{font-family:var(--sans)}

/* ── AUTH GATE ── */
#authGate{
  position:fixed;inset:0;background:var(--forest);
  display:flex;align-items:center;justify-content:center;z-index:9999;
}
.auth-box{background:var(--white);padding:48px 40px;width:100%;max-width:380px;text-align:center}
.auth-box h1{font-family:var(--serif);font-size:28px;font-weight:400;margin-bottom:4px}
.auth-box p{font-size:13px;color:var(--gray);margin-bottom:28px}
.auth-field{margin-bottom:14px;text-align:left}
.auth-field label{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--gray);display:block;margin-bottom:6px;font-weight:600}
.auth-field input{width:100%;border:1.5px solid var(--stone);padding:12px 14px;font-size:14px;outline:none;transition:border-color .2s}
.auth-field input:focus{border-color:var(--forest)}
.auth-btn{width:100%;background:var(--forest);color:#fff;padding:15px;font-size:12px;font-weight:600;letter-spacing:2px;text-transform:uppercase;margin-top:6px;transition:background .2s}
.auth-btn:hover{background:var(--dark)}
.auth-err{font-size:12px;color:var(--red);margin-top:8px;display:none;text-align:left}
.auth-logo{font-family:var(--serif);font-size:22px;color:var(--forest);margin-bottom:20px;display:block}
.auth-logo span{color:var(--gold)}

/* ── SIDEBAR ── */
.sidebar{
  width:var(--sidebar);flex-shrink:0;
  background:var(--forest);
  min-height:100vh;
  display:flex;flex-direction:column;
  position:sticky;top:0;height:100vh;overflow-y:auto;
}
.sidebar-logo{
  padding:28px 24px 24px;
  font-family:var(--serif);font-size:20px;color:#fff;font-weight:400;
  border-bottom:1px solid rgba(255,255,255,0.1);
}
.sidebar-logo span{color:var(--gold)}
.sidebar-logo small{display:block;font-family:var(--sans);font-size:10px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.4);margin-top:2px}
.sidebar-nav{padding:16px 0;flex:1}
.nav-group-label{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.3);padding:12px 24px 6px;font-weight:600}
.sidebar-item{
  display:flex;align-items:center;gap:12px;
  padding:12px 24px;color:rgba(255,255,255,0.6);
  font-size:13px;font-weight:500;cursor:pointer;
  transition:background .2s,color .2s;
}
.sidebar-item:hover,.sidebar-item.active{background:rgba(255,255,255,0.08);color:#fff}
.sidebar-item.active{border-right:3px solid var(--gold)}
.sidebar-item svg{width:18px;height:18px;stroke:currentColor;fill:none;flex-shrink:0}
.sidebar-bottom{padding:16px 24px 24px;border-top:1px solid rgba(255,255,255,0.1)}
.sidebar-user{font-size:12px;color:rgba(255,255,255,0.5);margin-bottom:12px}
.sidebar-user strong{display:block;color:rgba(255,255,255,0.85);font-size:13px}
.sidebar-logout{
  display:flex;align-items:center;gap:8px;
  font-size:12px;color:rgba(255,255,255,0.4);cursor:pointer;transition:color .2s;
}
.sidebar-logout:hover{color:#fff}

/* ── MAIN CONTENT ── */
.main{flex:1;min-width:0;padding:32px;overflow-x:hidden}
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;flex-wrap:wrap;gap:12px}
.page-title{font-family:var(--serif);font-size:28px;font-weight:400}
.page-sub{font-size:13px;color:var(--gray);margin-top:2px}
.btn{
  padding:10px 22px;font-size:11px;font-weight:600;letter-spacing:1.5px;
  text-transform:uppercase;cursor:pointer;transition:background .2s,color .2s;border:none;
  font-family:var(--sans);
}
.btn-primary{background:var(--forest);color:#fff}
.btn-primary:hover{background:var(--dark)}
.btn-gold{background:var(--gold);color:var(--dark)}
.btn-gold:hover{opacity:.88}
.btn-danger{background:var(--red);color:#fff}
.btn-outline{background:transparent;border:1.5px solid var(--stone);color:var(--dark)}
.btn-outline:hover{background:var(--stone)}
.btn-sm{padding:7px 14px;font-size:10px}

/* ── STATS ── */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:28px}
.stat-card{background:var(--white);padding:24px 20px;border-bottom:3px solid transparent}
.stat-card.green{border-bottom-color:var(--green)}
.stat-card.gold{border-bottom-color:var(--gold)}
.stat-card.blue{border-bottom-color:var(--blue)}
.stat-card.forest{border-bottom-color:var(--forest)}
.stat-icon{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin-bottom:14px}
.stat-icon svg{width:20px;height:20px;stroke:#fff;fill:none}
.stat-num{font-family:var(--serif);font-size:32px;font-weight:400;line-height:1;margin-bottom:4px}
.stat-label{font-size:11px;color:var(--lgray);letter-spacing:0.5px}
.stat-delta{font-size:11px;color:var(--green);margin-top:6px;font-weight:500}

/* ── CHART ── */
.chart-grid{display:grid;grid-template-columns:2fr 1fr;gap:16px;margin-bottom:28px}
.chart-card{background:var(--white);padding:24px}
.chart-card h3{font-family:var(--serif);font-size:18px;font-weight:400;margin-bottom:20px}
.bar-chart{display:flex;align-items:flex-end;gap:8px;height:140px}
.bar-wrap{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1}
.bar{background:var(--forest);width:100%;transition:height .4s;min-height:4px;opacity:.85}
.bar:hover{opacity:1;background:var(--gold)}
.bar-label{font-size:9px;color:var(--lgray);letter-spacing:.5px}
.bar-val{font-size:9px;color:var(--gray)}
.donut-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%}
.donut-legend{margin-top:16px;width:100%}
.donut-item{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--gray);margin-bottom:6px}
.donut-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}

/* ── TABLE ── */
.table-card{background:var(--white);overflow:hidden;margin-bottom:20px}
.table-head-bar{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid var(--stone);flex-wrap:wrap;gap:12px}
.table-head-bar h3{font-family:var(--serif);font-size:18px;font-weight:400}
.search-input{
  border:1.5px solid var(--stone);padding:8px 14px;font-size:13px;outline:none;
  transition:border-color .2s;width:220px;
}
.search-input:focus{border-color:var(--forest)}
.data-table{width:100%;border-collapse:collapse}
.data-table th{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--lgray);font-weight:600;text-align:left;padding:12px 16px;background:var(--ivory);border-bottom:1px solid var(--stone)}
.data-table td{padding:14px 16px;border-bottom:1px solid var(--stone);font-size:13px;vertical-align:middle}
.data-table tr:last-child td{border-bottom:none}
.data-table tr:hover td{background:var(--ivory)}
.table-scroll{overflow-x:auto}
.status-badge{
  display:inline-block;padding:4px 10px;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;
}
.status-new{background:#FEF3C7;color:#92400E}
.status-confirmed{background:#D1FAE5;color:#065F46}
.status-production{background:#DBEAFE;color:#1E40AF}
.status-shipped{background:#EDE9FE;color:#4C1D95}
.status-done{background:#D1FAE5;color:#065F46}
.status-cancelled{background:#FEE2E2;color:#991B1B}
.table-actions{display:flex;gap:8px;align-items:center}
.pagination{display:flex;align-items:center;justify-content:center;gap:8px;padding:16px;border-top:1px solid var(--stone)}
.pg-btn{
  width:36px;height:36px;border:1px solid var(--stone);background:transparent;
  font-size:13px;cursor:pointer;transition:background .2s;display:flex;align-items:center;justify-content:center;
}
.pg-btn:hover,.pg-btn.active{background:var(--forest);color:#fff;border-color:var(--forest)}

/* ── MODAL ── */
.modal-overlay{
  position:fixed;inset:0;z-index:800;background:rgba(0,0,0,0.45);
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .3s;padding:20px;
}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--white);width:100%;max-width:520px;padding:36px;max-height:90vh;overflow-y:auto;position:relative}
.modal h3{font-family:var(--serif);font-size:22px;font-weight:400;margin-bottom:24px}
.modal-close{position:absolute;top:16px;right:16px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--lgray);font-size:20px}
.modal-close:hover{color:var(--dark)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-field{display:flex;flex-direction:column;gap:6px}
.form-field.full{grid-column:1/-1}
.form-field label{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--gray);font-weight:600}
.form-field input,.form-field select,.form-field textarea{
  border:1.5px solid var(--stone);padding:10px 12px;font-size:13px;outline:none;transition:border-color .2s;background:transparent;
}
.form-field input:focus,.form-field select:focus,.form-field textarea:focus{border-color:var(--forest)}
.form-field textarea{resize:vertical;min-height:80px}
.modal-actions{display:flex;gap:10px;margin-top:20px;justify-content:flex-end}

/* ── TABS ── */
.tabs{display:flex;border-bottom:1px solid var(--stone);margin-bottom:24px;flex-wrap:wrap}
.tab{
  padding:10px 20px;font-size:12px;font-weight:600;letter-spacing:1px;text-transform:uppercase;
  cursor:pointer;color:var(--lgray);border-bottom:2px solid transparent;margin-bottom:-1px;
  transition:color .2s,border-color .2s;white-space:nowrap;
}
.tab.active{color:var(--forest);border-bottom-color:var(--forest)}

/* ── LOADING ── */
.loading{text-align:center;padding:60px;color:var(--lgray);font-size:14px}
.loading-spinner{width:32px;height:32px;border:3px solid var(--stone);border-top-color:var(--forest);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--dark);color:#fff;padding:12px 24px;font-size:13px;font-weight:500;
  z-index:9000;opacity:0;transition:all .3s;white-space:nowrap;pointer-events:none;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── ORDER DETAIL ── */
.order-detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
.detail-block{background:var(--ivory);padding:16px}
.detail-block h4{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--lgray);margin-bottom:10px;font-weight:600}
.detail-block p{font-size:13px;margin-bottom:4px;color:var(--dark)}
.detail-block p span{color:var(--lgray)}
.order-items-table{width:100%;border-collapse:collapse;margin-bottom:16px}
.order-items-table th{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--lgray);text-align:left;padding:8px 12px;background:var(--ivory);font-weight:600}
.order-items-table td{padding:10px 12px;border-bottom:1px solid var(--stone);font-size:13px}
.order-total{text-align:right;font-size:18px;font-weight:600;color:var(--forest);padding:12px 0}
.status-select{border:1.5px solid var(--stone);padding:8px 12px;font-size:13px;outline:none;background:transparent;cursor:pointer}

/* ── KASPI BLOCK ── */
.kaspi-box{background:var(--ivory);border-left:3px solid var(--gold);padding:16px 20px;margin-bottom:16px}
.kaspi-box .kaspi-title{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--lgray);font-weight:600;margin-bottom:6px}
.kaspi-box .kaspi-phone{font-family:var(--serif);font-size:22px;color:var(--forest)}
.kaspi-box .kaspi-sum{font-size:13px;color:var(--gray);margin-top:4px}
.kaspi-link{display:inline-block;margin-top:10px;background:#f50;color:#fff;padding:9px 20px;font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;text-decoration:none}
.kaspi-link:hover{background:#d44400}

/* ── SETTINGS INFO ── */
.info-box{background:var(--ivory);padding:16px 20px;border-left:3px solid var(--forest);margin-bottom:16px;font-size:13px;color:var(--gray);line-height:1.7}
.info-box strong{color:var(--dark)}
.info-box code{background:var(--stone);padding:2px 6px;font-size:12px;font-family:monospace}

/* ── RESPONSIVE ── */
@media(max-width:900px){
  .sidebar{width:60px}
  .sidebar-logo small,.sidebar-item span,.sidebar-logo span,.sidebar-user,.sidebar-logout span,.nav-group-label{display:none}
  .sidebar-logo{padding:20px 18px;font-size:0}
  .sidebar-item{padding:16px;justify-content:center}
  .sidebar-item svg{width:20px;height:20px}
  .main{padding:20px 16px}
  .stats-grid{grid-template-columns:1fr 1fr}
  .form-grid{grid-template-columns:1fr}
  .order-detail-grid{grid-template-columns:1fr}
  .chart-grid{grid-template-columns:1fr}
}
@media(max-width:600px){
  .stats-grid{grid-template-columns:1fr 1fr}
  .page-header{flex-direction:column;align-items:flex-start;gap:12px}
  .stat-card{padding:18px 14px}
  .stat-num{font-size:26px}
}
</style>
</head>
<body>

<!-- AUTH GATE -->
<div id="authGate">
  <div class="auth-box">
    <span class="auth-logo">Qamshy <span>Made</span></span>
    <h1>Панель администратора</h1>
    <p>Войдите с правами администратора</p>
    <div class="auth-field">
      <label>Email</label>
      <input type="email" id="adEmail" placeholder="admin@qamshy.kz">
    </div>
    <div class="auth-field">
      <label>Пароль</label>
      <input type="password" id="adPass" placeholder="••••••••" onkeydown="if(event.key==='Enter')adminLogin()">
    </div>
    <div class="auth-err" id="adErr"></div>
    <button class="auth-btn" onclick="adminLogin()">Войти</button>
  </div>
</div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <div class="sidebar-logo">Qamshy <span>Made</span><small>Админ панель</small></div>
  <nav class="sidebar-nav">
    <div class="nav-group-label">Главное</div>
    <div class="sidebar-item active" onclick="showPage('dashboard')">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      <span>Дашборд</span>
    </div>
    <div class="nav-group-label">Магазин</div>
    <div class="sidebar-item" onclick="showPage('orders')">
      <svg viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
      <span>Заказы</span>
    </div>
    <div class="sidebar-item" onclick="showPage('products')">
      <svg viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
      <span>Товары</span>
    </div>
    <div class="nav-group-label">Пользователи</div>
    <div class="sidebar-item" onclick="showPage('users')">
      <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      <span>Пользователи</span>
    </div>
    <div class="sidebar-item" onclick="showPage('analytics')">
      <svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/><line x1="2" y1="20" x2="22" y2="20"/></svg>
      <span>Аналитика</span>
    </div>
    <div class="sidebar-item" onclick="showPage('content')">
      <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      <span>Контент</span>
    </div>
    <div class="sidebar-item" onclick="showPage('settings')">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      <span>Настройки</span>
    </div>
  </nav>
  <div class="sidebar-bottom">
    <div class="sidebar-user" id="adminName"><strong>Загрузка...</strong></div>
    <div class="sidebar-logout" onclick="adminLogout()">
      <svg viewBox="0 0 24 24" style="width:16px;height:16px;stroke:currentColor;fill:none"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      <span>Выйти</span>
    </div>
  </div>
</div>

<!-- MAIN -->
<div class="main" id="mainContent"></div>

<!-- ORDER DETAIL MODAL -->
<div class="modal-overlay" id="orderModal">
  <div class="modal" style="max-width:640px">
    <div class="modal-close" onclick="closeOrderModal()">✕</div>
    <h3 id="orderModalTitle">Заказ</h3>
    <div id="orderModalBody"></div>
  </div>
</div>

<!-- PRODUCT MODAL -->
<div class="modal-overlay" id="productModal">
  <div class="modal">
    <div class="modal-close" onclick="closeProductModal()">✕</div>
    <h3 id="productModalTitle">Добавить товар</h3>
    <div class="form-grid">
      <div class="form-field full">
        <label>Название</label>
        <input type="text" id="pm_name" placeholder="Кровать «Arco Forest»">
      </div>
      <div class="form-field">
        <label>Категория</label>
        <select id="pm_cat">
          <option value="beds">Кровати</option>
          <option value="sofas">Диваны</option>
          <option value="chairs">Кресла</option>
          <option value="sets">Гарнитуры</option>
        </select>
      </div>
      <div class="form-field">
        <label>Цена (₸)</label>
        <input type="number" id="pm_price" placeholder="180000">
      </div>
      <div class="form-field">
        <label>Старая цена (₸)</label>
        <input type="number" id="pm_oldprice" placeholder="212000">
      </div>
      <div class="form-field">
        <label>Метка</label>
        <select id="pm_label">
          <option value="">Без метки</option>
          <option value="new">Новинка</option>
          <option value="hit">Хит</option>
          <option value="sale">Скидка</option>
        </select>
      </div>
      <div class="form-field">
        <label>В наличии</label>
        <select id="pm_stock">
          <option value="true">Да</option>
          <option value="false">Нет</option>
        </select>

const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNpbXdkc2phZ256cWd2cXZoY2FuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1NDkzNjMsImV4cCI6MjA5MDEyNTM2M30.jczq0BnsnLYOSguN2vW2amQnGl4BNgOR4D2uF6PEZtg';

// Простой Supabase клиент без SDK (fetch-based)
const sb = {
  url: SUPABASE_URL,
  key: SUPABASE_ANON_KEY,
  headers: {
    'apikey': SUPABASE_ANON_KEY,
    'Content-Type': 'application/json'
  },
  authHeaders(token) {
    return token
      ? { ...this.headers, 'Authorization': `Bearer ${token}` }
      : { ...this.headers, 'Authorization': `Bearer ${this.key}` };
  },
  async from(table, token) {
    const h = this.authHeaders(token);
    return {
      select: async (cols='*', opts={}) => {
        let url = `${sb.url}/rest/v1/${table}?select=${cols}`;
        if (opts.order) url += `&order=${opts.order}`;
        if (opts.filter) url += `&${opts.filter}`;
        const r = await fetch(url, { headers: h });
        if (!r.ok) throw await r.json();
        return r.json();
      },
      insert: async (data) => {
        const r = await fetch(`${sb.url}/rest/v1/${table}`, {
          method:'POST', headers:{...h,'Prefer':'return=representation'},
          body: JSON.stringify(data)
        });
        if (!r.ok) throw await r.json();
        return r.json();
      },
      update: async (data, match) => {
        let url = `${sb.url}/rest/v1/${table}?${match}`;
        const r = await fetch(url, {
          method:'PATCH', headers:{...h,'Prefer':'return=representation'},
          body: JSON.stringify(data)
        });
        if (!r.ok) throw await r.json();
        return r.json();
      },
      delete: async (match) => {
        const r = await fetch(`${sb.url}/rest/v1/${table}?${match}`, {
          method:'DELETE', headers: h
        });
        if (!r.ok) throw await r.json();
        return true;
      }
    };
  },
  async signIn(email, password) {
    const r = await fetch(`${this.url}/auth/v1/token?grant_type=password`, {
      method:'POST', headers: this.headers,
      body: JSON.stringify({ email, password })
    });
    return r.json();
  },
  async signOut(token) {
    await fetch(`${this.url}/auth/v1/logout`, {
      method:'POST', headers: this.authHeaders(token)
    });
  },
  async getUser(token) {
    const r = await fetch(`${this.url}/auth/v1/user`, {
      headers: this.authHeaders(token)
    });
    return r.json();
  }
};

window.handleImgUpload = function(input) {
  const file = input.files[0];
  if (!file) return;
  if (file.size > 2 * 1024 * 1024) { adToast('Файл слишком большой (макс. 2 МБ)'); return; }
  const reader = new FileReader();
  reader.onload = function(e) {
    const base64 = e.target.result;
    document.getElementById('pm_img').value = base64;
    document.getElementById('imgPreviewImg').src = base64;
    document.getElementById('imgPreview').style.display = 'block';
    document.getElementById('imgPlaceholder').style.display = 'none';
    document.getElementById('imgRemoveBtn').style.display = 'block';
    document.getElementById('imgUploadArea').style.borderColor = 'var(--forest)';
  };
  reader.readAsDataURL(file);
};

  document.getElementById('imgPlaceholder').style.display = 'block';
  document.getElementById('imgRemoveBtn').style.display = 'none';
  document.getElementById('imgUploadArea').style.borderColor = 'var(--stone)';
};

function resetImgUpload(existingImg) {
  const val = existingImg || '';
  document.getElementById('pm_img').value = val;
  document.getElementById('pm_img_file').value = '';
  if (val) {
    document.getElementById('imgPreviewImg').src = val;
    document.getElementById('imgPreview').style.display = 'block';
    document.getElementById('imgPlaceholder').style.display = 'none';
    document.getElementById('imgRemoveBtn').style.display = 'block';
    document.getElementById('imgUploadArea').style.borderColor = 'var(--forest)';
  } else {
    document.getElementById('imgPreviewImg').src = '';

window.saveProduct = async function() {
  const data = {
    name:      document.getElementById('pm_name').value.trim(),
    cat:       document.getElementById('pm_cat').value,
    price:     parseInt(document.getElementById('pm_price').value)||0,
    old_price: parseInt(document.getElementById('pm_oldprice').value)||0,
    label:     document.getElementById('pm_label').value,
    in_stock:  document.getElementById('pm_stock').value === 'true',
    description: document.getElementById('pm_desc').value.trim(),
    img:       document.getElementById('pm_img').value.trim(),
    updated_at: new Date().toISOString()
  };
  if (!data.name) { adToast('Введите название'); return; }
  try {
    if (authToken === 'demo') {
      if (editingProductId) {
        const i = allProducts.findIndex(p=>p.id===editingProductId);
        if (i>=0) allProducts[i] = {...allProducts[i],...data};
        adToast('Товар обновлён (демо)');
      } else {
        allProducts.push({id:'p'+Date.now(),...data});
        adToast('Товар добавлен (демо)');
      }
    } else {
      const t = await sb.from('products', authToken);
      if (editingProductId) {
        await t.update(data, `id=eq.${editingProductId}`);
        const i = allProducts.findIndex(p=>p.id===editingProductId);
        if (i>=0) allProducts[i] = {...allProducts[i],...data};
        adToast('Товар обновлён');
      } else {
        data.created_at = new Date().toISOString();
        const rows = await t.insert(data);
        allProducts.push(rows[0]);
        adToast('Товар добавлен');
      }
    }
    closeProductModal();
    renderProducts(document.getElementById('mainContent'));
  } catch(e) { adToast('Ошибка: '+(e.message||JSON.stringify(e))); }
};

window.deleteProduct = async function(id) {
  if (!confirm('Удалить товар?')) return;
  try {
    if (authToken !== 'demo') {
      const t = await sb.from('products', authToken);
      await t.delete(`id=eq.${id}`);
    }
    allProducts = allProducts.filter(p=>p.id!==id);
    adToast('Товар удалён');
    renderProducts(document.getElementById('mainContent'));
  } catch(e) { adToast('Ошибка: '+(e.message||e)); }
};

      .filter(o => {
        if (!o.created_at) return false;
        const od = new Date(o.created_at);
        return od.getMonth()===d.getMonth() && od.getFullYear()===d.getFullYear() && o.status!=='cancelled';
      })
      .reduce((s,o)=>s+(o.total||0),0);
    return { label: months[d.getMonth()], rev };

  const maxRev = Math.max(...monthly.map(m=>m.rev), 1);

  const avgOrder = allOrders.length ? Math.round(totalRev/allOrders.length) : 0;

let _content = {};

async function loadContent() {
  try {
    if (authToken && authToken !== 'demo') {
      const t = await sb.from('site_content', authToken);
      const rows = await t.select('*');
      if (rows && rows.length > 0) {
        rows.forEach(r => { _content[r.key] = r.value; });
      }
    }
  } catch(e) { console.warn('loadContent:', e); }
}

async function saveContentKey(key, value) {
  try {
    if (authToken && authToken !== 'demo') {
      const r = await fetch(`${SUPABASE_URL}/rest/v1/site_content?key=eq.${encodeURIComponent(key)}`, {
        method: 'GET',
        headers: sb.authHeaders(authToken)
      });
      const existing = await r.json();
      if (existing && existing.length > 0) {
        await fetch(`${SUPABASE_URL}/rest/v1/site_content?key=eq.${encodeURIComponent(key)}`, {
          method: 'PATCH',
          headers: { ...sb.authHeaders(authToken), 'Prefer': 'return=minimal' },
          body: JSON.stringify({ value, updated_at: new Date().toISOString() })
        });
      } else {
        await fetch(`${SUPABASE_URL}/rest/v1/site_content`, {
          method: 'POST',
          headers: { ...sb.authHeaders(authToken), 'Prefer': 'return=minimal' },
          body: JSON.stringify({ key, value, updated_at: new Date().toISOString() })
        });
      }
    }
    _content[key] = value;
  } catch(e) { throw e; }
}

function cv(key, fallback='') {
  return (_content[key] !== undefined ? _content[key] : fallback)
    .replace(/&/g,'&amp;').replace(/"/g,'&quot;');
}

window.saveSettings = function() {
  const wa    = document.getElementById('set_wa')?.value?.trim();
  const ig    = document.getElementById('set_ig')?.value?.trim();
  const kaspi = document.getElementById('set_kaspi')?.value?.trim();
  const city  = document.getElementById('set_city')?.value?.trim();
  if (wa)    { _settings.wa = wa;       localStorage.setItem('qs_wa', wa); }
  if (ig)    { _settings.ig = ig;       localStorage.setItem('qs_ig', ig); }
  if (kaspi) { _settings.kaspi = kaspi; localStorage.setItem('qs_kaspi', kaspi); window._kaspiPhone = kaspi; }
  if (city)  { _settings.city = city;   localStorage.setItem('qs_city', city); }
  adToast('✓ Настройки сохранены!');
};

// ── HELPERS ──
function statusLabel(s){

}
function paymentLabel(p){return {kaspi:'💳 Kaspi',card:'Карта',installment:'Рассрочка'}[p]||p||'—'}
function deliveryLabel(d){return {courier:'Курьер',cdek:'СДЭК/Казпочта',pickup:'Самовывоз'}[d]||d||'—'}
function catLabel(c){return {beds:'Кровати',sofas:'Диваны',chairs:'Кресла',sets:'Гарнитуры'}[c]||c||'—'}
function labelText(l){return {new:'Новинка',hit:'Хит',sale:'Скидка'}[l]||l}
function formatDate(ts) {
  if (!ts) return '—';
  const d = new Date(ts);
  if (isNaN(d)) return '—';
  return d.toLocaleDateString('ru-RU',{day:'2-digit',month:'2-digit',year:'numeric'});
}
window.adToast = function(msg) {
  const t = document.getElementById('adToast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
};
